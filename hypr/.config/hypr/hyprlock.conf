source = ~/.cache/wal/colors-hyprland.conf

$font = "FiraCode Nerd Font"

general {
    hide_cursor = false
}

animations {
    enabled = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    size = 23%, 6%
    outline_thickness = 3

    inner_color = rgba(0, 0, 0, 0.0) # no fill
    outer_color = $foreground

    check_color = rgba(252, 142, 172, 0.2)
    fail_color = rgba(252, 142, 172, 0.8)
    font_color = $foreground

    fade_on_empty = false
    rounding = 30
    font_family = $font
    placeholder_text = Password?
    fail_text = WRONG!
    dots_spacing = 0.3
    # hide_input = true
    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = $foreground
    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font
    color = $foreground
    position = -30, -150
    halign = right
    valign = top
}
